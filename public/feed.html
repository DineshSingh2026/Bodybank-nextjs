<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BodyBank Elite Feed</title>
  <link rel="manifest" href="/manifest.json">
  <script src="/js/bb-pwa-update.js?v=1" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/feed.css">
</head>
<body>
  <header class="feed-top">
    <div class="feed-top-left">
      <img class="feed-top-logo" src="/img/Bodybank logo.png" alt="BodyBank logo" loading="lazy">
      <div class="feed-top-copy">
        <h1>BodyBank Elite Feed</h1>
        <p>All Posts</p>
      </div>
    </div>
    <div class="feed-top-actions">
      <a class="feed-brand-link feed-back-link" href="/index.html">← Back to Website</a>
    </div>
  </header>

  <main class="feed-list" id="feedList" aria-live="polite"></main>
  <div id="feedSkeleton" class="feed-skeleton"></div>
  <div id="feedEnd" class="feed-end hidden">You have reached the latest posts.</div>

  <a class="feed-cta" href="/index.html#login">Sign In to Post</a>

  <script src="/js/feed.js" defer></script>
</body>
</html>
